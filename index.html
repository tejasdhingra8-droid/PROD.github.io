<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>study.crow | Enhanced</title>
    <!-- Favicon Fix: Using logo.jpeg as the tab icon -->
    <link rel="icon" type="image/jpeg" href="logo.jpeg">
    <link rel="shortcut icon" href="logo.jpeg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            color: white;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden; 
            margin: 0;
        }

        .font-knockout { 
            font-family: 'Oswald', sans-serif; 
            letter-spacing: -0.04em; 
            transform: scaleY(1.2); 
            display: inline-block; 
        }

        /* --- ADVANCED ANIMATIONS --- */
        @keyframes view-out {
            0% { opacity: 1; transform: scale(1); filter: blur(0px); }
            100% { opacity: 0; transform: scale(0.95); filter: blur(20px); }
        }

        @keyframes view-in {
            0% { opacity: 0; transform: scale(1.05); filter: blur(20px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0px); }
        }

        @keyframes slide-up-fade {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes subtle-float { 
            0%, 100% { transform: translateY(0px); } 
            50% { transform: translateY(-12px); } 
        }

        @keyframes spin-slow { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }

        .view-transition-out { animation: view-out 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .view-transition-in { animation: view-in 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        
        .stagger-item { opacity: 0; animation: slide-up-fade 0.5s ease-out forwards; }
        
        #main-scroll-container {
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: white; margin-top: -6px; cursor: pointer; }

        /* Spotify Pulse */
        .spotify-pulse {
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
            animation: pulse-green 2s infinite;
        }
        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
    </style>
</head>
<body>
    <div id="bg-layer" class="fixed inset-0 z-0 transition-all duration-1000"></div>

    <div id="main-scroll-container" class="no-scrollbar">
        <main class="relative z-10 container mx-auto px-6 py-12 min-h-screen flex flex-col">
            <!-- Settings Trigger -->
            <div class="fixed top-8 right-8 z-[70]">
                <button onclick="toggleSettings(true)" class="p-4 bg-white/5 backdrop-blur-3xl border border-white/10 rounded-2xl hover:bg-white hover:text-black transition-all">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                </button>
            </div>

            <div id="view-port" class="flex-1 flex flex-col">
                <!-- Dashboard View -->
                <div id="view-dashboard" class="view-content flex-1 flex flex-col items-center justify-center text-center space-y-16">
                    <div class="animate-subtle-float">
                        <div class="w-28 h-28 bg-black rounded-[2.8rem] flex items-center justify-center mb-10 shadow-[0_0_80px_rgba(255,255,255,0.05)] mx-auto overflow-hidden border border-white/10">
                            <img src="logo.jpeg" alt="Study Crow Logo" class="w-full h-full object-cover" onerror="this.parentElement.innerHTML='<div class=\'text-white font-bold text-2xl font-knockout tracking-tighter\'>SC</div>'">
                        </div>
                        <h1 class="text-9xl font-knockout tracking-tighter uppercase leading-none">study<span class="text-white/20">.</span>crow</h1>
                        <p class="mt-6 text-white/30 font-bold tracking-[0.6em] text-[10px] uppercase">Peak Performance System</p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-3xl">
                        <button onclick="switchTab('tasks')" class="stagger-item group p-12 rounded-[3rem] border bg-white/5 border-white/10 hover:border-white/50 transition-all duration-700" style="animation-delay: 0.1s">
                            <i data-lucide="check-square" class="w-10 h-10 mx-auto mb-6 text-white/20 group-hover:text-white transition-all"></i>
                            <span class="block font-knockout text-3xl uppercase tracking-tighter">Task List</span>
                        </button>
                        <button onclick="switchTab('lockin')" class="stagger-item group p-12 rounded-[3rem] border bg-white/5 border-white/10 hover:border-white/50 transition-all duration-700" style="animation-delay: 0.2s">
                            <i data-lucide="clock" class="w-10 h-10 mx-auto mb-6 text-white/20 group-hover:text-white transition-all"></i>
                            <span class="block font-knockout text-3xl uppercase tracking-tighter">Lock In</span>
                        </button>
                    </div>
                </div>

                <!-- Task Module View -->
                <div id="view-tasks" class="view-content hidden flex-1 max-w-4xl mx-auto w-full">
                    <button onclick="switchTab('dashboard')" class="group flex items-center gap-2 text-white/50 hover:text-white transition-all w-fit mb-4">
                        <div class="p-2 rounded-full border border-white/10 bg-white/5 backdrop-blur-md group-hover:border-white group-hover:bg-white group-hover:text-black transition-all">
                            <i data-lucide="arrow-left" class="w-4 h-4"></i>
                        </div>
                        <span class="font-bold text-[10px] tracking-[0.3em] uppercase">Dashboard</span>
                    </button>

                    <header class="flex justify-between items-end mt-8 mb-12">
                        <div class="stagger-item">
                            <h2 class="text-7xl font-knockout uppercase tracking-tighter leading-none">Task List</h2>
                            <p id="current-date-display" class="text-[10px] font-bold text-white/20 uppercase tracking-[0.4em] mt-2"></p>
                        </div>
                        <button onclick="toggleCalendar(true)" class="stagger-item px-6 py-3 bg-white text-black font-bold uppercase tracking-widest text-[10px] rounded-xl" style="animation-delay: 0.1s">Change Date</button>
                    </header>

                    <div class="stagger-item bg-white/5 border border-white/10 p-8 rounded-[2.5rem] mb-10" style="animation-delay: 0.2s">
                        <div class="flex gap-4 mb-6">
                            <input id="task-input" type="text" placeholder="DEFINE OBJECTIVE..." class="flex-1 bg-white/5 border border-white/10 rounded-xl px-6 py-4 text-xs font-bold uppercase tracking-widest focus:outline-none">
                            <button handleAddTask() class="bg-white text-black px-8 rounded-xl"><i data-lucide="plus"></i></button>
                        </div>
                        <div id="subject-selectors" class="flex flex-wrap gap-3"></div>
                    </div>

                    <div id="filter-bar" class="stagger-item flex items-center gap-4 mb-6 overflow-x-auto no-scrollbar pb-2" style="animation-delay: 0.3s"></div>
                    <div id="task-list" class="space-y-3"></div>
                </div>

                <!-- Lock In View -->
                <div id="view-lockin" class="view-content hidden flex-1 max-w-7xl mx-auto flex flex-col gap-8 w-full">
                    <button onclick="switchTab('dashboard')" class="group flex items-center gap-2 text-white/50 hover:text-white transition-all w-fit mb-4">
                        <div class="p-2 rounded-full border border-white/10 bg-white/5 backdrop-blur-md group-hover:border-white group-hover:bg-white group-hover:text-black transition-all">
                            <i data-lucide="arrow-left" class="w-4 h-4"></i>
                        </div>
                        <span class="font-bold text-[10px] tracking-[0.3em] uppercase">Dashboard</span>
                    </button>

                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                        <!-- Record Player -->
                        <div class="stagger-item lg:col-span-7 bg-white/5 backdrop-blur-3xl border border-white/10 rounded-[4rem] p-12 flex flex-col items-center justify-center text-center group relative overflow-hidden h-full min-h-[600px]">
                            <div class="absolute top-8 left-8">
                                <div class="flex items-center gap-2 px-3 py-1 bg-white/10 rounded-full border border-white/10">
                                    <div id="spotify-status-dot" class="w-2 h-2 rounded-full bg-white/20"></div>
                                    <span id="spotify-status-text" class="text-[8px] font-bold uppercase tracking-widest text-white/40">Offline</span>
                                </div>
                            </div>

                            <div class="relative w-64 h-64 lg:w-80 lg:h-80 mb-12 flex items-center justify-center">
                                <div id="record-disk" class="absolute inset-0 bg-zinc-900 rounded-full border-[14px] border-zinc-800 shadow-[0_0_100px_rgba(0,0,0,0.5)] flex items-center justify-center transition-transform duration-[3000ms] ease-linear">
                                    <div class="w-full h-full rounded-full opacity-30 bg-[repeating-radial-gradient(circle,_#000_0,_#000_1px,_transparent_2px,_transparent_4px)]"></div>
                                    <div id="album-art-container" class="absolute w-28 h-28 lg:w-32 lg:h-32 rounded-full overflow-hidden border-4 border-zinc-900 shadow-inner z-10 transition-all duration-500">
                                        <div class="w-full h-full bg-zinc-800 flex items-center justify-center">
                                            <i data-lucide="music" class="text-white/20 w-8 h-8"></i>
                                        </div>
                                    </div>
                                </div>
                                <div id="tone-arm" class="absolute -right-6 -top-4 w-3 h-40 bg-gradient-to-b from-zinc-600 to-zinc-800 origin-top transform transition-transform duration-1000 z-20 rotate-0">
                                    <div class="absolute bottom-0 w-8 h-6 bg-zinc-700 rounded-sm -left-2.5 shadow-lg border-b-2 border-zinc-900"></div>
                                </div>
                            </div>

                            <div class="mb-10 max-w-sm">
                                <h4 id="track-name" class="text-3xl font-knockout uppercase tracking-tight mb-2 truncate">No Track Connected</h4>
                                <p id="artist-name" class="text-[11px] font-bold text-white/30 uppercase tracking-[0.25em]">Sync your Spotify session</p>
                            </div>

                            <div class="flex items-center gap-5">
                                <button id="sync-button" onclick="loginToSpotify()" class="px-8 py-5 bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 transition-all flex items-center gap-3">
                                    <i id="sync-icon" data-lucide="log-in" class="w-4 h-4"></i>
                                    <span id="sync-btn-text" class="text-[11px] font-bold uppercase tracking-widest">Login with Spotify</span>
                                </button>
                            </div>
                        </div>

                        <!-- Right Side -->
                        <div class="lg:col-span-5 flex flex-col gap-8 h-full">
                            <div class="stagger-item bg-white/5 backdrop-blur-3xl border border-white/10 rounded-[3rem] p-8 flex flex-col items-center text-center" style="animation-delay: 0.1s">
                                <span class="text-[10px] font-bold text-white/20 uppercase tracking-[0.4em] mb-4 block">Study Clock</span>
                                <div id="timer-display" class="text-6xl font-knockout tracking-tighter tabular-nums leading-none mb-8">00:00:00</div>
                                <div class="flex gap-3 w-full">
                                    <button id="btn-timer-toggle" onclick="toggleTimer()" class="flex-1 py-4 rounded-2xl font-bold uppercase tracking-widest text-[10px] transition-all flex items-center justify-center gap-3 bg-white text-black">
                                        <i data-lucide="play" class="w-4 h-4"></i> <span>Start</span>
                                    </button>
                                    <button onclick="resetTimer()" class="px-6 py-4 bg-white/5 text-white/40 rounded-2xl text-[10px] font-bold uppercase tracking-widest border border-white/5">Reset</button>
                                </div>
                            </div>

                            <div class="stagger-item flex-1 bg-white/5 backdrop-blur-3xl border border-white/10 rounded-[3rem] p-8 flex flex-col overflow-hidden" style="animation-delay: 0.2s">
                                <div class="flex items-center justify-between mb-6">
                                    <div>
                                        <h3 class="text-2xl font-knockout uppercase tracking-tight">Objectives</h3>
                                        <p id="task-progress-text" class="text-[9px] font-bold text-white/20 uppercase tracking-widest">0 / 0 Completed</p>
                                    </div>
                                    <button onclick="switchTab('tasks')" class="p-2 bg-white/5 rounded-full text-white/40 hover:text-white transition-all">
                                        <i data-lucide="chevron-right" class="w-5 h-5"></i>
                                    </button>
                                </div>
                                <div id="lockin-task-list" class="flex-1 overflow-y-auto pr-2 space-y-3 no-scrollbar max-h-[400px]"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="settings-overlay" class="hidden fixed inset-0 z-[100] flex items-center justify-end p-6 pointer-events-none">
        <div class="w-full max-w-sm bg-black/80 backdrop-blur-3xl border border-white/10 rounded-[3rem] p-10 pointer-events-auto shadow-2xl animate-settings-enter">
             <div class="flex items-center justify-between mb-12">
                <h3 class="text-2xl font-knockout uppercase tracking-tight">System Visuals</h3>
                <button onclick="toggleSettings(false)" class="p-2 hover:bg-white/10 rounded-full"><i data-lucide="x"></i></button>
            </div>
            <div class="space-y-10">
                <div onclick="document.getElementById('file-input').click()" class="aspect-video rounded-3xl border border-dashed border-white/10 bg-white/5 flex flex-col items-center justify-center cursor-pointer relative overflow-hidden">
                    <div id="bg-preview" class="absolute inset-0 w-full h-full object-cover opacity-50 hidden"></div>
                    <i data-lucide="image" class="text-white/20 w-8 h-8"></i>
                    <input id="file-input" type="file" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
                </div>
                <div>
                    <label class="block text-[8px] font-bold uppercase tracking-widest text-white/30 mb-2">Brightness</label>
                    <input type="range" min="0" max="100" id="range-brightness" class="w-full" oninput="updateSettings()">
                </div>
                <div>
                    <label class="block text-[8px] font-bold uppercase tracking-widest text-white/30 mb-2">Blur</label>
                    <input type="range" min="0" max="50" id="range-blur" class="w-full" oninput="updateSettings()">
                </div>
            </div>
        </div>
    </div>

    <div id="calendar-modal" class="hidden fixed inset-0 z-[101] flex items-center justify-center p-6 bg-black/80 backdrop-blur-2xl">
        <div class="bg-zinc-950 border border-white/10 rounded-[3rem] p-10 w-full max-w-md shadow-2xl scale-in-center">
            <div class="flex items-center justify-between mb-10">
                <h3 class="text-4xl font-knockout uppercase tracking-tighter text-white">Calendar</h3>
                <button onclick="toggleCalendar(false)" class="p-3 hover:bg-white/10 text-white rounded-full"><i data-lucide="x"></i></button>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7 gap-3"></div>
        </div>
    </div>

    <script>
        // --- SPOTIFY CONFIG ---
        // 1. Paste your long Client ID between the single quotes below:
        const SPOTIFY_CLIENT_ID = 'bb7dbf7550ff4793930f9f9d93862848'; 
        
        // 2. This gets the exact URL you are on right now to send to Spotify
        const REDIRECT_URI = window.location.origin + window.location.pathname;
        const SCOPES = 'user-read-currently-playing user-read-playback-state';

        // --- CONSTANTS & STATE ---
        const SUBJECTS = [
            { id: 'physics', label: 'Physics', icon: 'atom', color: 'text-blue-400' },
            { id: 'chemistry', label: 'Chemistry', icon: 'beaker', color: 'text-emerald-400' },
            { id: 'maths', label: 'Maths', icon: 'divide', color: 'text-purple-400' },
            { id: 'general', label: 'General', icon: 'check-square', color: 'text-white/40' }
        ];

        let tasks = JSON.parse(localStorage.getItem('prod_suite_tasks')) || {};
        let settings = JSON.parse(localStorage.getItem('prod_suite_settings')) || { bgImage: '', brightness: 30, blur: 10 };
        let studyTime = JSON.parse(localStorage.getItem('study_time_data')) || { seconds: 0 };
        let selectedDate = new Date().toISOString().split('T')[0];
        let activeTab = 'dashboard';
        let activeFilter = 'all';
        let selectedSubjectId = 'general';
        let isTimerRunning = false;
        let timerInterval = null;
        
        // Spotify State
        let spotifyToken = null;
        let spotifyInterval = null;

        // --- SPOTIFY INTEGRATION ---
        function loginToSpotify() {
            if (SPOTIFY_CLIENT_ID === 'YOUR_CLIENT_ID_HERE') {
                alert("Hold on! You need to paste your Client ID from the Spotify Dashboard into the code (line 215) first.");
                return;
            }
            
            // Generate Spotify Login URL
            const authUrl = `https://accounts.spotify.com/authorize?client_id=${SPOTIFY_CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(SCOPES)}&show_dialog=true`;
            window.location.href = authUrl;
        }

        function handleSpotifyAuth() {
            // Check for access token in the URL after redirect
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const token = params.get('access_token');
            const error = params.get('error');

            if (error) {
                console.error("Spotify Auth Error:", error);
            }

            if (token) {
                spotifyToken = token;
                // Clear the hash from the URL so it looks clean
                history.replaceState(null, null, window.location.pathname);
                startSpotifyPolling();
            }
        }

        async function fetchCurrentlyPlaying() {
            if (!spotifyToken) return;
            try {
                const response = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
                    headers: { 'Authorization': `Bearer ${spotifyToken}` }
                });
                
                if (response.status === 204) {
                    updateSpotifyUI(null); // Nothing playing
                    return;
                }
                
                if (response.status === 401) {
                    // Token expired
                    spotifyToken = null;
                    clearInterval(spotifyInterval);
                    document.getElementById('sync-btn-text').innerText = "Session Expired. Re-login.";
                    return;
                }

                const data = await response.json();
                updateSpotifyUI(data);
            } catch (error) {
                console.error('Spotify Fetch Error:', error);
            }
        }

        function startSpotifyPolling() {
            fetchCurrentlyPlaying();
            // Poll every 4 seconds for a smooth real-time feel
            spotifyInterval = setInterval(fetchCurrentlyPlaying, 4000); 
        }

        function updateSpotifyUI(data) {
            const disk = document.getElementById('record-disk');
            const arm = document.getElementById('tone-arm');
            const statusDot = document.getElementById('spotify-status-dot');
            const statusText = document.getElementById('spotify-status-text');
            const trackNameEl = document.getElementById('track-name');
            const artistNameEl = document.getElementById('artist-name');
            const artContainer = document.getElementById('album-art-container');
            const syncText = document.getElementById('sync-btn-text');
            const syncIcon = document.getElementById('sync-icon');

            if (!data || !data.item) {
                trackNameEl.innerText = "Spotify Synced";
                artistNameEl.innerText = "Play a song on your app";
                disk.classList.remove('animate-spin-slow');
                arm.style.transform = 'rotate(0deg)';
                statusDot.className = 'w-2 h-2 rounded-full bg-white/20';
                statusText.innerText = 'Online';
                return;
            }

            const item = data.item;
            const isPlaying = data.is_playing;

            trackNameEl.innerText = item.name;
            artistNameEl.innerText = item.artists.map(a => a.name).join(', ');
            
            // Album Art
            if (item.album.images.length > 0) {
                artContainer.innerHTML = `<img src="${item.album.images[0].url}" class="w-full h-full object-cover rounded-full">`;
            }

            // Visual Status
            statusDot.className = 'w-2 h-2 rounded-full bg-green-500 spotify-pulse';
            statusText.innerText = isPlaying ? 'Playing' : 'Paused';
            statusText.className = 'text-[8px] font-bold uppercase tracking-widest text-green-400';

            syncText.innerText = isPlaying ? "Live Sync Active" : "Paused";
            syncIcon.setAttribute('data-lucide', 'check-circle');

            if (isPlaying) {
                disk.classList.add('animate-spin-slow');
                arm.style.transform = 'rotate(32deg)';
            } else {
                disk.classList.remove('animate-spin-slow');
                arm.style.transform = 'rotate(0deg)';
            }
            lucide.createIcons();
        }

        // --- DASHBOARD & VIEW LOGIC ---
        function switchTab(nextTab) {
            if (activeTab === nextTab) return;
            const currentView = document.getElementById(`view-${activeTab}`);
            const nextView = document.getElementById(`view-${nextTab}`);
            currentView.classList.add('view-transition-out');
            setTimeout(() => {
                currentView.classList.add('hidden');
                currentView.classList.remove('view-transition-out');
                nextView.classList.remove('hidden');
                nextView.classList.add('view-transition-in');
                activeTab = nextTab;
                if (nextTab === 'tasks') renderTaskList();
                if (nextTab === 'lockin') renderLockInTasks();
                const items = nextView.querySelectorAll('.stagger-item');
                items.forEach((item, i) => {
                    item.style.animation = 'none';
                    item.offsetHeight; 
                    item.style.animation = `slide-up-fade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards ${i * 0.08}s`;
                });
                setTimeout(() => { nextView.classList.remove('view-transition-in'); }, 600);
            }, 500);
        }

        window.onload = () => {
            lucide.createIcons();
            applySettings();
            renderCalendar();
            renderSubjectSelectors();
            renderFilters();
            updateDateDisplay();
            updateTimerUI();
            handleSpotifyAuth();
            document.getElementById('task-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAddTask(); });
        };

        function toggleSettings(open) {
            const el = document.getElementById('settings-overlay');
            if (open) {
                el.classList.remove('hidden');
                document.getElementById('range-brightness').value = settings.brightness;
                document.getElementById('range-blur').value = settings.blur;
            } else el.classList.add('hidden');
        }

        function updateSettings() {
            settings.brightness = document.getElementById('range-brightness').value;
            settings.blur = document.getElementById('range-blur').value;
            applySettings();
        }

        function applySettings() {
            const layer = document.getElementById('bg-layer');
            if (settings.bgImage) {
                layer.style.backgroundImage = `url(${settings.bgImage})`;
                layer.style.backgroundSize = 'cover';
                layer.style.backgroundPosition = 'center';
                layer.style.filter = `brightness(${settings.brightness}%) blur(${settings.blur}px)`;
            }
            localStorage.setItem('prod_suite_settings', JSON.stringify(settings));
        }

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onloadend = () => {
                    settings.bgImage = reader.result;
                    document.getElementById('bg-preview').src = reader.result;
                    document.getElementById('bg-preview').classList.remove('hidden');
                    applySettings();
                };
                reader.readAsDataURL(file);
            }
        }

        function renderSubjectSelectors() {
            document.getElementById('subject-selectors').innerHTML = SUBJECTS.map(sub => `
                <button onclick="selectSubject('${sub.id}')" class="flex items-center gap-2 px-4 py-2 rounded-full border transition-all text-[10px] font-bold uppercase tracking-widest ${selectedSubjectId === sub.id ? 'bg-white text-black border-white' : 'bg-white/5 text-white/40 border-white/10'}">
                    <i data-lucide="${sub.icon}" class="w-3 h-3"></i> ${sub.label}
                </button>
            `).join('');
            lucide.createIcons();
        }

        function selectSubject(id) { selectedSubjectId = id; renderSubjectSelectors(); }

        function handleAddTask() {
            const input = document.getElementById('task-input');
            const text = input.value.trim();
            if (!text) return;
            const newTask = { id: crypto.randomUUID(), text, subjectId: selectedSubjectId, completed: false };
            if (!tasks[selectedDate]) tasks[selectedDate] = [];
            tasks[selectedDate].push(newTask);
            input.value = '';
            saveTasks();
            renderTaskList();
        }

        function toggleTask(id) {
            const task = (tasks[selectedDate] || []).find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTaskList();
                if (activeTab === 'lockin') renderLockInTasks();
            }
        }

        function deleteTask(id) {
            tasks[selectedDate] = (tasks[selectedDate] || []).filter(t => t.id !== id);
            saveTasks();
            renderTaskList();
        }

        function saveTasks() { localStorage.setItem('prod_suite_tasks', JSON.stringify(tasks)); }

        function renderFilters() {
            let html = `<div class="p-2 text-white/20"><i data-lucide="filter" class="w-4 h-4"></i></div>
                <button onclick="setFilter('all')" class="px-4 py-1.5 rounded-full text-[9px] font-bold uppercase tracking-widest border transition-all ${activeFilter === 'all' ? 'bg-white/20 border-white/40' : 'bg-transparent border-white/5 text-white/20'}">All</button>`;
            html += SUBJECTS.map(sub => `<button onclick="setFilter('${sub.id}')" class="px-4 py-1.5 rounded-full text-[9px] font-bold uppercase tracking-widest border transition-all ${activeFilter === sub.id ? 'bg-white/20 border-white/40 text-white' : 'bg-transparent border-white/5 text-white/20'}">${sub.label}</button>`).join('');
            document.getElementById('filter-bar').innerHTML = html;
            lucide.createIcons();
        }

        function setFilter(f) { activeFilter = f; renderFilters(); renderTaskList(); }

        function renderTaskList() {
            const container = document.getElementById('task-list');
            const filtered = (tasks[selectedDate] || []).filter(t => activeFilter === 'all' || t.subjectId === activeFilter);
            if (!filtered.length) { container.innerHTML = `<div class="py-12 text-center opacity-20 text-[10px] uppercase tracking-widest">Clear Horizons</div>`; return; }
            container.innerHTML = filtered.map((task, i) => {
                const sub = SUBJECTS.find(s => s.id === task.subjectId) || SUBJECTS[3];
                return `<div class="stagger-item p-5 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-between group" style="animation-delay: ${i * 0.05}s">
                    <div class="flex items-center gap-4">
                        <button onclick="toggleTask('${task.id}')"><i data-lucide="${task.completed ? 'check-circle-2' : 'circle'}" class="${task.completed ? 'text-white' : 'text-white/20'}"></i></button>
                        <div class="flex flex-col text-left">
                            <span class="font-bold uppercase tracking-tight ${task.completed ? 'line-through opacity-30' : ''}">${task.text}</span>
                            <span class="text-[8px] font-bold uppercase tracking-widest ${sub.color}">${sub.label}</span>
                        </div>
                    </div>
                    <button onclick="deleteTask('${task.id}')" class="opacity-0 group-hover:opacity-100 text-white/20 hover:text-white transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function renderLockInTasks() {
            const dayTasks = tasks[selectedDate] || [];
            document.getElementById('task-progress-text').innerText = `${dayTasks.filter(t => t.completed).length} / ${dayTasks.length} Completed`;
            if (!dayTasks.length) { document.getElementById('lockin-task-list').innerHTML = `<div class="py-12 text-center opacity-10 uppercase text-[9px]">Empty Stack</div>`; return; }
            document.getElementById('lockin-task-list').innerHTML = dayTasks.map(task => {
                const sub = SUBJECTS.find(s => s.id === task.subjectId) || SUBJECTS[3];
                return `<div onclick="toggleTask('${task.id}')" class="p-4 bg-white/5 border rounded-2xl flex items-center gap-4 cursor-pointer transition-all ${task.completed ? 'opacity-40 border-white/5' : 'border-white/10'}">
                    <div class="p-2 rounded-lg bg-white/5 ${sub.color}"><i data-lucide="${sub.icon}" class="w-3 h-3"></i></div>
                    <div class="flex-1 text-left"><p class="text-[11px] font-bold uppercase truncate ${task.completed ? 'line-through' : ''}">${task.text}</p></div>
                    <i data-lucide="${task.completed ? 'check-circle-2' : 'circle'}" class="w-4 h-4 ${task.completed ? 'text-white' : 'text-white/10'}"></i>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function toggleTimer() {
            isTimerRunning = !isTimerRunning;
            if (isTimerRunning) {
                timerInterval = setInterval(() => { studyTime.seconds++; updateTimerUI(); localStorage.setItem('study_time_data', JSON.stringify(studyTime)); }, 1000);
            } else clearInterval(timerInterval);
            updateTimerUI();
        }

        function resetTimer() { isTimerRunning = false; clearInterval(timerInterval); studyTime.seconds = 0; updateTimerUI(); }

        function updateTimerUI() {
            const s = studyTime.seconds;
            document.getElementById('timer-display').innerText = `${Math.floor(s/3600).toString().padStart(2,'0')}:${Math.floor((s%3600)/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
            const btn = document.getElementById('btn-timer-toggle');
            btn.className = `flex-1 py-4 rounded-2xl font-bold uppercase tracking-widest text-[10px] transition-all flex items-center justify-center gap-3 ${isTimerRunning ? 'bg-red-500/10 text-red-500' : 'bg-white text-black'}`;
            btn.innerHTML = `<i data-lucide="${isTimerRunning?'pause':'play'}" class="w-4 h-4"></i> <span>${isTimerRunning?'Pause':'Start'}</span>`;
            lucide.createIcons();
        }

        function toggleCalendar(open) { document.getElementById('calendar-modal').classList.toggle('hidden', !open); }
        function renderCalendar() {
            let h = ''; for(let i=1;i<=31;i++) {
                const ds = `2024-01-${String(i).padStart(2,'0')}`;
                h += `<button onclick="setDate('${ds}')" class="h-10 w-10 flex items-center justify-center rounded-lg text-xs font-bold ${selectedDate===ds?'bg-white text-black':'text-white hover:bg-white/10'}">${i}</button>`;
            }
            document.getElementById('calendar-grid').innerHTML = h;
        }
        function setDate(d) { selectedDate = d; updateDateDisplay(); toggleCalendar(false); if(activeTab==='tasks') renderTaskList(); if(activeTab==='lockin') renderLockInTasks(); }
        function updateDateDisplay() { document.getElementById('current-date-display').innerText = selectedDate; }
    </script>
</body>
</html>
